<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asset Assign Support</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #F5D547;
    --yellow-dark: #d4b730;
    --yellow-light: #fdf6c3;
    --black: #111111;
    --white: #ffffff;
    --bg: #f9f8f5;
    --surface: #ffffff;
    --text: #111111;
    --text-muted: #6b6b6b;
    --border: #e8e4d8;
    --radius: 14px;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--black);
    padding: 13px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 3px solid var(--yellow);
  }

  .header-icon {
    width: 36px;
    height: 36px;
    background: var(--yellow);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border: 2px solid var(--yellow-dark);
  }

  .header-info h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  .header-info p {
    font-size: 11.5px;
    color: #999;
    margin-top: 2px;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #4ade80;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  /* ── Chat Area ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Messages ── */
  .message {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--black);
  }

  .msg-avatar.bot  { background: var(--yellow); font-size: 15px; }
  .msg-avatar.user {
    background: var(--black);
    color: var(--yellow);
    font-size: 10px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 14px;
    font-size: 13.5px;
    line-height: 1.6;
    border: 2px solid var(--black);
  }

  .message.bot .bubble {
    background: var(--white);
    border-radius: 14px 14px 14px 2px;
    color: var(--text);
    box-shadow: 3px 3px 0px var(--yellow);
  }

  .message.user .bubble {
    background: var(--black);
    border-radius: 14px 14px 2px 14px;
    color: var(--white);
  }

  /* ── Typing indicator ── */
  .typing {
    display: flex;
    gap: 5px;
    padding: 12px 14px;
    align-items: center;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: var(--black);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Suggestion chips — NOW BUTTONS ── */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 9px;
  }

  button.suggestion-chip {
    padding: 6px 12px;
    background: var(--yellow-light);
    color: var(--black);
    border: 1.5px solid var(--black);
    border-radius: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 2px 2px 0 var(--black);
    text-align: left;
    /* reset default button styles */
    appearance: none;
    -webkit-appearance: none;
    line-height: 1.4;
  }

  button.suggestion-chip:hover {
    background: var(--yellow);
    box-shadow: 1px 1px 0 var(--black);
    transform: translate(1px, 1px);
  }

  button.suggestion-chip:active {
    transform: translate(2px, 2px);
    box-shadow: none;
  }

  /* ── Input bar ── */
  .input-bar {
    background: var(--white);
    border-top: 2px solid var(--black);
    padding: 11px 13px;
    display: flex;
    gap: 9px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 2px solid var(--black);
    border-radius: 11px;
    display: flex;
    align-items: center;
    padding: 4px 6px 4px 12px;
    transition: all 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--yellow-dark);
    box-shadow: 0 0 0 3px rgba(245,213,71,0.25);
  }

  textarea {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 110px;
    padding: 7px 0;
  }

  textarea::placeholder { color: #bbb; }

  .send-btn {
    width: 38px;
    height: 38px;
    background: var(--yellow);
    border: 2px solid var(--black);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    box-shadow: 2px 2px 0 var(--black);
  }

  .send-btn:hover {
    background: var(--yellow-dark);
    box-shadow: 1px 1px 0 var(--black);
    transform: translate(1px, 1px);
  }

  .send-btn:active  { transform: translate(2px, 2px); box-shadow: none; }
  .send-btn:disabled { background: #eee; border-color: #ccc; box-shadow: none; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; fill: var(--black); }

  .powered {
    text-align: center;
    font-size: 10px;
    color: #ccc;
    padding: 3px 0 2px;
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">🎈</div>
  <div class="header-info">
    <h1>Asset Assign Support</h1>
    <p><span class="status-dot"></span>Ask me anything about the app</p>
  </div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea"></div>

<!-- Input -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Ask about Asset Assign..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
<div class="powered">Powered by Claude AI · Asset Assign Help</div>

<script>
// ✏️  PASTE YOUR CLOUDFLARE WORKER URL HERE
const WORKER_URL = "https://asset-assign.letnicolehelp.workers.dev/";

const SYSTEM_PROMPT = `You are a friendly, knowledgeable support assistant for Asset Assign — a rental inventory tracking tool built specifically for balloon artists and event decor professionals. These are people who rent out marquee letters, numbers, symbols, backdrops, framework, props, chairs, and similar event items.

Your goal is to help users understand how to use Asset Assign and answer questions confidently. Be warm, clear, and concise. Use plain language. If you genuinely don't know something specific, say so and suggest they reach out to support directly.

Here is everything you know about Asset Assign:

## What Asset Assign Is
Asset Assign helps balloon artists and event decor pros track their rental inventory so they never double-book. It shows what items are booked, what's available, and when things are due back — without complex software, spreadsheets, or whiteboards. Built by Nicole, who created it after working with dozens of event decor pros who were tired of losing track of inventory.

## Pricing & Trial
- $197 per year
- 14-day free trial — no charge if you cancel before the trial ends
- After 14 days, automatically charged $197/yr
- Cancel anytime from account settings — no contracts, no hassle
- Several reminders sent before card is charged
- Everything is included: unlimited inventory, unlimited reservations, all features, all updates
- Founding Members can lock in at $147/yr + get double referral bonuses (join the waitlist)

## Key Features
1. Phrase Checker — Type any phrase (like "JANE & TIM 2026") and instantly see if every letter/number/symbol is available on a specific date. Shows exactly how many are required vs. available for each character. This is the core feature for marquee letter users.
2. Bulk Inventory Upload — Upload your full inventory via CSV template. Supports letters, numbers, symbols, backdrops, framework, signs, chairs, props, and more.
3. Reservation Management — Create reservations, assign items to events, edit reservations when clients change their mind, mark items returned with one click.
4. Calendar with Filters — View reservations filtered by status: pending, confirmed, in progress, completed, overdue. Dashboard shows counts per status at a glance.
5. Quick Copy — One-click copy of full reservation details to paste anywhere.
6. Inventory Management — Manage categories (built-in: Letters, Numbers, Symbols; custom: Backdrops, Banners, Chairs, Framework, Props, Signs, etc.), duplicate items, edit quantities.
7. Search — Search inventory and within the reservation process.
8. Guided Tour — 4-step guided tour when you activate your account.

## Setup
- Takes less than 30 minutes
- Sign up → get access code → sign in → guided tour walks you through uploading inventory with the CSV template

## Limitations / Roadmap
- One user per account (no multi-user yet)
- Google Calendar integration is actively being worked on (not available yet)

## Common Questions
- "How do I check if letters are available?" → Use the phrase checker — type the phrase, pick the date, click Check Phrase Availability
- "Can multiple people use my account?" → Not yet, one user per account
- "Does it sync with Google Calendar?" → Not yet — it's being developed
- "How do I upload my inventory?" → Use the CSV template during setup
- "How do I cancel?" → Cancel from account settings anytime, no contracts
- "What happens after my trial?" → After 14 days you're charged $197/yr. Cancel before then at no cost.
- "How do I mark something returned?" → One-click return button on the reservation
- "What categories are available?" → Built-in: Letters, Numbers, Symbols. You can add custom ones like Backdrops, Banners, Chairs, Framework, Props, Signs
- "How long does setup take?" → Less than 30 minutes
- "What's included?" → Everything: unlimited inventory, unlimited reservations, all features and updates

Always be warm and encouraging. If a question is about a specific bug, billing issue, or account problem, let them know and suggest contacting Nicole at Asset Assign directly.`;

let messages  = [];
let isLoading = false;

window.addEventListener('DOMContentLoaded', () => {
  addBotMessage(
    "Hi there! 👋 Welcome to Asset Assign support. Ask me anything — setting up your inventory, using the phrase checker, managing reservations, pricing, and more!",
    [
      "How does the phrase checker work?",
      "How do I upload my inventory?",
      "What does it cost?",
      "How long is the free trial?",
      "How do I create a reservation?",
      "Can I cancel anytime?"
    ]
  );
});

/* ── Helpers ── */
function escapeHtml(t) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(t));
  return d.innerHTML;
}

function formatText(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br/>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

/* ── Called by suggestion buttons ── */
function askQuestion(q) {
  const input = document.getElementById('msgInput');
  input.value = q;
  autoResize(input);
  sendMessage();
}

/* ── Render messages ── */
function addBotMessage(text, chips = []) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message bot';

  // Build chips as <button> elements so they work inside Notion iframes
  const chipsHtml = chips.length
    ? `<div class="suggestions">${chips.map(c => {
        const safe = escapeHtml(c);
        const json = JSON.stringify(c);   // safely quoted for onclick
        return `<button class="suggestion-chip" type="button" onclick="askQuestion(${json})">${safe}</button>`;
      }).join('')}</div>`
    : '';

  div.innerHTML = `
    <div class="msg-avatar bot">🎈</div>
    <div>
      <div class="bubble">${formatText(text)}</div>
      ${chipsHtml}
    </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addUserMessage(text) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `
    <div class="msg-avatar user">YOU</div>
    <div class="bubble">${escapeHtml(text)}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar bot">🎈</div>
    <div class="bubble typing"><span></span><span></span><span></span></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

/* ── Send ── */
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addUserMessage(text);
  messages.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.error) {
      addBotMessage("Hmm, something went wrong. Please try again in a moment.");
      console.error(data.error);
    } else {
      const reply = data.content[0].text;
      messages.push({ role: 'assistant', content: reply });
      addBotMessage(reply);
    }
  } catch (err) {
    removeTyping();
    addBotMessage("Sorry, I couldn't connect right now. Please try again in a moment.");
    console.error(err);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}
</script>
</body>
</html>
